name: Build, Test, Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    # Setup .NET
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    #  Run tests
    - name: Run xUnit tests
      run: dotnet test

    # Build Docker images
    - name: Build docker images
      run: docker compose build

    # Save images as tar
    - name: Save images
      run: |
        docker save vurello-server -o server.tar
        docker save vurello-client -o client.tar

    # Copy files to EC2
    - name: Copy files to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "server.tar,client.tar,docker-compose.yml"
        target: "~/Vurello"
        overwrite: true

    #  Deploy on EC2
    - name: SSH & Deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/Vurello

          sudo docker load -i server.tar
          sudo docker load -i client.tar

          docker compose down
          docker compose up -d
