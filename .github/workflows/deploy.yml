name: Build, Test, Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    # Setup .NET
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    #  Run tests
    - name: Run xUnit tests
      run: dotnet test

    # Build Docker images
    - name: Build docker images
      run: docker compose build

    # Save images as tar
    - name: Save images
      run: |
        docker save vurello-server -o server.tar
        docker save vurello-client -o client.tar
    
    - name: Fix permissions
      run: chmod +r server.tar client.tar

    # Copy files to EC2
    - name: Copy files to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "server.tar,client.tar,docker-compose.prod.yml"
        target: "~/Vurello"
        overwrite: true

    #  Deploy on EC2
    - name: SSH & Deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/Vurello

          docker-compose down
          docker system prune -af          

          cat <<EOF > .env
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          JWT_KEY=${{ secrets.JWT_KEY }}
          EOF
    
          
          sudo docker load -i server.tar
          sudo docker load -i client.tar

          docker-compose -f docker-compose.prod.yml up -d
